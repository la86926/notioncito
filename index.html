<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno · Tu espacio de trabajo</title>
<meta name="description" content="Cuaderno: un espacio de trabajo tipo Notion, gratuito y sin servidor. Tus datos se guardan en tu navegador.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📓</text></svg>">
<style>
/* ============ Variables y base ============ */
:root{
  --bg:#ffffff;
  --side:#f7f7f5;
  --fg:#37352f;
  --fg2:rgba(55,53,47,.78);
  --muted:rgba(55,53,47,.45);
  --hover:rgba(55,53,47,.06);
  --hover2:rgba(55,53,47,.12);
  --border:rgba(55,53,47,.14);
  --codebg:#f6f5f4;
  --callout:#f1f1ef;
  --accent:#2383e2;
  --danger:#eb5757;
  --shadow:0 12px 40px rgba(15,15,15,.18), 0 0 0 1px rgba(15,15,15,.04);
}
html[data-theme="dark"]{
  --bg:#191919;
  --side:#202020;
  --fg:rgba(255,255,255,.88);
  --fg2:rgba(255,255,255,.66);
  --muted:rgba(255,255,255,.38);
  --hover:rgba(255,255,255,.055);
  --hover2:rgba(255,255,255,.11);
  --border:rgba(255,255,255,.14);
  --codebg:#242424;
  --callout:#262626;
  --accent:#529cca;
  --danger:#ff7369;
  --shadow:0 12px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
}
*{box-sizing:border-box}
[hidden]{display:none!important}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif,"Segoe UI Emoji","Segoe UI Symbol";
  color:var(--fg);background:var(--bg);font-size:16px;
}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer;border-radius:4px;padding:0}
::selection{background:rgba(35,131,226,.25)}
kbd{font-family:inherit;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:0 4px;margin-left:auto}
a{color:inherit;text-decoration:underline;text-decoration-color:var(--muted);cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--hover2);border-radius:6px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ============ Estructura ============ */
#app{display:flex;height:100dvh}
#sidebar{width:250px;flex:none;background:var(--side);display:flex;flex-direction:column;transition:margin-left .18s ease;overflow:hidden;border-right:1px solid var(--border)}
body.sclosed #sidebar{margin-left:-251px}
#mainwrap{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:44px;flex:none;display:flex;align-items:center;gap:2px;padding:0 12px}
#content{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}

/* ============ Barra lateral ============ */
.side-head{display:flex;align-items:center;padding:12px 12px 8px 14px;gap:8px}
.logo{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:7px;flex:1}
#collapseBtn{width:26px;height:26px;color:var(--muted);border-radius:6px}
#collapseBtn:hover{background:var(--hover)}
.side-search,.side-new{margin:1px 8px;padding:6px 8px;text-align:left;border-radius:6px;font-size:14px;color:var(--fg2);display:flex;align-items:center;gap:8px}
.side-search:hover,.side-new:hover{background:var(--hover)}
.side-label{font-size:11.5px;font-weight:600;color:var(--muted);padding:12px 16px 4px;letter-spacing:.03em}
#pagelist{flex:1;overflow-y:auto;padding-bottom:8px}
.prow{display:flex;align-items:center;gap:3px;padding:4px 8px 4px 6px;margin:1px 8px;border-radius:6px;cursor:pointer;font-size:14px;color:var(--fg2);user-select:none}
.prow:hover{background:var(--hover)}
.prow.active{background:var(--hover);color:var(--fg);font-weight:500}
.arrow{width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:9px;color:var(--muted);transition:transform .15s}
.arrow.open{transform:rotate(90deg)}
.arrow:hover{background:var(--hover2)}
.arrow.nok{visibility:hidden}
.picon{width:20px;flex:none;text-align:center;font-size:15px}
.ptext{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pacts{display:none;gap:1px}
.prow:hover .pacts{display:flex}
.pacts button{width:20px;height:20px;font-size:12px;color:var(--muted);border-radius:4px;display:flex;align-items:center;justify-content:center}
.pacts button:hover{background:var(--hover2);color:var(--fg)}
.side-foot{margin-top:auto;display:flex;gap:4px;padding:8px 10px;border-top:1px solid var(--border)}
.side-foot button{flex:1;height:30px;border-radius:6px;font-size:15px;color:var(--fg2);display:flex;align-items:center;justify-content:center;position:relative}
.side-foot button:hover{background:var(--hover)}
.tbadge{position:absolute;top:1px;right:3px;font-size:9px;background:var(--accent);color:#fff;border-radius:8px;min-width:13px;height:13px;line-height:13px;text-align:center;padding:0 2px}
#soverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}
body.mopen #soverlay{display:block}

/* ============ Barra superior ============ */
#sbToggle,#pageMenuBtn{width:28px;height:28px;color:var(--fg2);border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none;font-size:15px}
#sbToggle:hover,#pageMenuBtn:hover{background:var(--hover)}
#crumbs{display:flex;align-items:center;gap:1px;overflow:hidden;flex:1;margin-left:4px}
.crumb{padding:4px 6px;border-radius:5px;font-size:14px;color:var(--fg2);white-space:nowrap;max-width:190px;overflow:hidden;text-overflow:ellipsis}
.crumb:hover{background:var(--hover)}
.csep{color:var(--muted);font-size:13px;padding:0 1px}
#savedTag{font-size:12px;color:var(--muted);opacity:0;transition:opacity .4s;margin-right:8px;flex:none}
#savedTag.show{opacity:1}

/* ============ Página ============ */
#cover{height:220px;background-size:cover;background-position:center;position:relative}
.cover-acts{position:absolute;right:28px;bottom:12px;display:flex;gap:6px;opacity:0;transition:opacity .15s}
#cover:hover .cover-acts{opacity:1}
.cover-acts button{background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:12.5px;padding:4px 8px;color:var(--fg2)}
.cover-acts button:hover{color:var(--fg)}
#pagepad{max-width:900px;margin:0 auto;padding:0 clamp(48px,9vw,96px)}
#pagepad.full{max-width:none}
#pagepad.small{font-size:14px}
#pagepad.font-serif .bc,#pagepad.font-serif #ptitle,#pagepad.font-serif td{font-family:Georgia,"Iowan Old Style","Times New Roman",serif}
#pagepad.font-mono .bc,#pagepad.font-mono #ptitle,#pagepad.font-mono td{font-family:ui-monospace,"Cascadia Mono",Consolas,"Courier New",monospace}
#phead{padding-top:72px;position:relative}
#phead.hascover{padding-top:20px}
.ghosts{height:26px;display:flex;gap:6px;align-items:center;opacity:0;transition:opacity .15s;margin-bottom:2px}
#phead:hover .ghosts{opacity:1}
.ghosts button{font-size:13px;color:var(--muted);padding:4px 6px;border-radius:6px;display:flex;align-items:center;gap:5px}
.ghosts button:hover{background:var(--hover)}
#picon{font-size:76px;line-height:1;border-radius:10px;padding:2px 6px;margin-left:-6px;display:inline-block}
#picon:hover{background:var(--hover)}
#phead.hascover #picon{margin-top:-52px;position:relative}
#ptitle{font-size:40px;font-weight:700;line-height:1.15;letter-spacing:-.015em;margin:8px 0 4px;outline:none;word-break:break-word;padding:2px 0}
#ptitle:empty::before{content:attr(data-ph);color:var(--muted)}
#blocks{padding-top:10px}
#pagebottom{height:30vh;cursor:text}

/* ============ Bloques ============ */
.block{position:relative;display:flex;padding:1px 0}
.block[data-type="h1"]{margin-top:26px}
.block[data-type="h2"]{margin-top:18px}
.block[data-type="h3"]{margin-top:12px}
.block[data-type="divider"]{margin:2px 0}
.block:first-child{margin-top:0}
.bm{flex:1;min-width:0}
.bh{width:46px;margin-left:-46px;flex:none;display:flex;justify-content:flex-end;align-items:flex-start;gap:1px;padding-top:4px;opacity:0;transition:opacity .12s}
@media (hover:hover){.block:hover .bh{opacity:1}}
@media (hover:none){.bh{opacity:.45}}
.bh button{width:22px;height:22px;border-radius:5px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:15px}
.bh button:hover{background:var(--hover);color:var(--fg)}
.bdrag{cursor:grab;font-size:12px;letter-spacing:-2px}
.block.dragging{opacity:.35}
.block.drop-before{box-shadow:0 -2px 0 var(--accent)}
.block.drop-after{box-shadow:0 2px 0 var(--accent)}

.bc{outline:none;padding:3px 2px;line-height:1.55;min-height:1.55em;word-break:break-word;white-space:pre-wrap}
.bc:empty::before{content:attr(data-ph);color:var(--muted);pointer-events:none}
.t-text:empty::before{opacity:0}
.t-text:focus:empty::before{opacity:1}
.t-h1{font-size:1.875em;font-weight:600;line-height:1.25}
.t-h2{font-size:1.5em;font-weight:600;line-height:1.3}
.t-h3{font-size:1.25em;font-weight:600;line-height:1.3}
.t-quote{border-left:3px solid var(--fg);padding-left:14px;margin:2px 0}
.brow{display:flex;align-items:flex-start;gap:2px}
.brow .bc{flex:1;min-width:0}
.marker{width:24px;flex:none;text-align:center;user-select:none;padding-top:3px;line-height:1.55;color:var(--fg)}
.todo-check{width:16px;height:16px;margin:7px 6px 0 2px;flex:none;accent-color:var(--accent);cursor:pointer}
.bc.done{text-decoration:line-through;color:var(--muted)}
.tgl{width:28px;height:28px;flex:none;margin-top:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--fg);border-radius:5px;transition:transform .15s}
.tgl:hover{background:var(--hover)}
.tgl.open{transform:rotate(90deg)}
.callout{display:flex;gap:8px;background:var(--callout);border-radius:8px;padding:14px 14px 14px 10px;margin:3px 0;align-items:flex-start}
.cemoji{font-size:19px;width:28px;height:28px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:6px}
.cemoji:hover{background:var(--hover2)}
.callout .bc{flex:1;padding-top:4px}
.divider{height:14px;display:flex;align-items:center;width:100%}
.divider div{height:1px;width:100%;background:var(--border)}
.bc.code{background:var(--codebg);border-radius:8px;padding:16px;font-family:ui-monospace,"Cascadia Mono",Consolas,"Courier New",monospace;font-size:.85em;tab-size:2;margin:3px 0}
code{background:var(--codebg);border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:.88em;font-family:ui-monospace,Consolas,monospace;color:#eb5757}
html[data-theme="dark"] code{color:#ff8f85}
.img-add{width:100%;background:var(--codebg);border-radius:6px;padding:13px;color:var(--muted);font-size:14px;text-align:left;margin:3px 0}
.img-add:hover{background:var(--hover2)}
.imgwrap{position:relative;margin:4px 0;max-width:100%}
.imgwrap img{max-width:100%;border-radius:5px;display:block}
.iacts{position:absolute;top:8px;right:8px;display:flex;gap:5px;opacity:0;transition:opacity .15s}
.imgwrap:hover .iacts{opacity:1}
.iacts button{background:rgba(20,20,20,.72);color:#fff;font-size:12px;padding:4px 8px;border-radius:5px}
.tblwrap{margin:6px 0;overflow-x:auto}
.tblwrap table{border-collapse:collapse;width:100%}
.tblwrap td{border:1px solid var(--border);padding:6px 9px;min-width:90px;font-size:.95em;outline:none;vertical-align:top}
.tblwrap td:focus{box-shadow:inset 0 0 0 2px var(--accent)}
.tacts{display:flex;gap:6px;padding-top:5px;opacity:0;transition:opacity .15s}
.block:hover .tacts{opacity:1}
.tacts button{font-size:12px;color:var(--muted);padding:2px 7px;border-radius:5px;border:1px solid var(--border)}
.tacts button:hover{background:var(--hover);color:var(--fg)}
.pageblock{display:flex;align-items:center;gap:7px;padding:3px 4px;border-radius:5px;cursor:pointer;margin:1px 0}
.pageblock:hover{background:var(--hover)}
.pageblock .pbt{font-weight:500;border-bottom:1px solid var(--hover2)}

/* ============ Popups ============ */
.pop{position:fixed;z-index:250;background:var(--bg);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);max-height:350px;overflow-y:auto;min-width:250px;padding:6px}
.plabel{font-size:11px;color:var(--muted);padding:5px 10px 3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.pi{display:flex;gap:10px;align-items:center;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:14px}
.pi:hover,.pi.sel{background:var(--hover)}
.pi.danger{color:var(--danger)}
.pi .ic{width:28px;height:28px;flex:none;border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--bg)}

.toggle-menu-icon{
  font-size:17px;
  line-height:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

  
.pi .pit{flex:1;min-width:0}
.pi .pit small{display:block;color:var(--muted);font-size:11.5px;font-weight:400}
.pi .chk{margin-left:auto;color:var(--accent);font-size:13px}
.psep{height:1px;background:var(--border);margin:6px 4px}
.pempty{padding:10px 12px;color:var(--muted);font-size:13.5px}
.egrid{display:grid;grid-template-columns:repeat(8,34px);gap:2px;padding:4px}
.egrid button{width:34px;height:34px;font-size:20px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.egrid button:hover{background:var(--hover)}
.erow{display:flex;gap:6px;padding:6px;border-top:1px solid var(--border);margin-top:4px}
.erow button{flex:1;font-size:13px;padding:6px;border-radius:6px;color:var(--fg2)}
.erow button:hover{background:var(--hover)}
.cgrid{display:grid;grid-template-columns:repeat(4,66px);gap:6px;padding:6px}
.cgrid div{height:42px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.cgrid div:hover{border-color:var(--accent)}
.fontrow{display:flex;gap:6px;padding:4px 8px 8px}
.fontrow button{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--fg2)}
.fontrow button.on{border-color:var(--accent);color:var(--accent)}
.fontrow .ag{font-size:17px;color:var(--fg)}
.fontrow button.on .ag{color:var(--accent)}
.fontrow small{font-size:10.5px}
.fontrow .f-serif .ag{font-family:Georgia,serif}
.fontrow .f-mono .ag{font-family:ui-monospace,Consolas,monospace}
.ipop{padding:10px;min-width:300px}
.ipop input[type="text"]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--fg);font:inherit;font-size:14px;outline:none}
.ipop input[type="text"]:focus{border-color:var(--accent)}
.ipop .irow{display:flex;gap:6px;margin-top:8px}
.ipop .irow button{flex:1;padding:7px;border-radius:6px;font-size:13.5px;border:1px solid var(--border);color:var(--fg2)}
.ipop .irow button.prim{background:var(--accent);color:#fff;border-color:var(--accent)}
.ipop .osep{text-align:center;color:var(--muted);font-size:12px;margin:8px 0 0}

/* ============ Barra de formato ============ */
#fmt{position:fixed;display:flex;gap:1px;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow);z-index:300}
#fmt button{width:29px;height:29px;border-radius:6px;font-size:14px;color:var(--fg2);display:flex;align-items:center;justify-content:center}
#fmt button:hover{background:var(--hover);color:var(--fg)}

/* ============ Modales ============ */
.mback{position:fixed;inset:0;background:rgba(15,15,15,.4);z-index:400;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh}
.mcard{background:var(--bg);border-radius:12px;width:min(580px,92vw);max-height:68vh;display:flex;flex-direction:column;box-shadow:var(--shadow);overflow:hidden}
.mcard input[type="text"]{padding:15px 18px;font-size:16px;border:none;outline:none;background:transparent;color:var(--fg);border-bottom:1px solid var(--border)}
.mlist{overflow-y:auto;padding:8px}
.mrow{display:flex;gap:10px;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer}
.mrow:hover{background:var(--hover)}
.mrow .mtxt{flex:1;min-width:0}
.mrow .mtxt b{font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow .mtxt small{color:var(--muted);font-size:12.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrow .macts{display:flex;gap:4px}
.mrow .macts button{font-size:12.5px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);color:var(--fg2)}
.mrow .macts button:hover{background:var(--hover)}
.mfoot{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.mfoot button{font-size:13px;color:var(--danger);padding:5px 10px;border-radius:6px}
.mfoot button:hover{background:var(--hover)}
.mtitle{padding:14px 18px 6px;font-weight:600;font-size:15px}

/* ============ Móvil ============ */
@media (max-width:760px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:150;transform:translateX(-100%);transition:transform .2s;margin-left:0!important;box-shadow:none}
  body.mopen #sidebar{transform:none;box-shadow:var(--shadow)}
  #pagepad{padding:0 18px 0 46px}
  .bh{width:38px;margin-left:-38px}
  #ptitle{font-size:31px}
  #phead{padding-top:44px}
  #cover{height:150px}
  .crumb{max-width:110px}
}


/* ============ Funciones avanzadas estilo Notion ============ */
.top-action{height:28px;padding:0 8px;border-radius:6px;font-size:13px;color:var(--fg2);display:flex;align-items:center;gap:5px;flex:none}
.top-action:hover{background:var(--hover);color:var(--fg)}
#commentsPanel{position:fixed;top:44px;right:0;bottom:0;width:min(380px,92vw);background:var(--bg);border-left:1px solid var(--border);z-index:210;box-shadow:-10px 0 30px rgba(15,15,15,.08);display:flex;flex-direction:column}
.cpanel-head{height:50px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--border);gap:8px}.cpanel-head b{flex:1}.cpanel-head button{width:28px;height:28px;border-radius:6px}.cpanel-head button:hover{background:var(--hover)}
.cpanel-list{flex:1;overflow:auto;padding:12px}.comment-card{border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:10px}.comment-meta{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}.comment-meta b{color:var(--fg2);font-size:13px}.comment-meta .sp{flex:1}.comment-meta button{width:24px;height:24px;border-radius:5px}.comment-meta button:hover{background:var(--hover)}
.comment-quote{margin:7px 0;padding:6px 8px;border-left:3px solid var(--accent);background:var(--hover);font-size:12px;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.comment-body{font-size:14px;line-height:1.45;white-space:pre-wrap}.comment-card.unread{box-shadow:inset 3px 0 0 var(--accent)}.comment-card.muted{opacity:.68}
.cpanel-compose{border-top:1px solid var(--border);padding:10px}.cpanel-compose textarea{width:100%;min-height:70px;resize:vertical;border:1px solid var(--border);background:transparent;color:var(--fg);border-radius:8px;padding:9px;font:inherit;outline:none}.cpanel-compose textarea:focus{border-color:var(--accent)}.cpanel-compose .row{display:flex;justify-content:flex-end;margin-top:7px}.cpanel-compose button{background:var(--accent);color:#fff;border-radius:6px;padding:6px 12px;font-size:13px}
.cover-picker{min-width:min(560px,94vw);max-height:520px}.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 6px}.tabs button{padding:9px 11px;border-radius:0;font-size:13px;color:var(--fg2);border-bottom:2px solid transparent}.tabs button.on{color:var(--fg);border-bottom-color:var(--fg)}.tabbody{padding:10px}.cover-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.cover-tile{height:74px;border-radius:7px;background-size:cover!important;background-position:center!important;border:2px solid transparent}.cover-tile:hover{border-color:var(--accent)}

<script>
/* =====================================================
   Cuaderno — espacio de trabajo tipo Notion, sin servidor.
   Todo se guarda en el localStorage de este navegador.
   ===================================================== */

/* ---------- utilidades ---------- */
function $(s, r){ return (r || document).querySelector(s); }
function $$(s, r){ return Array.prototype.slice.call((r || document).querySelectorAll(s)); }
function uid(){ return Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function plain(html){ var d = document.createElement('div'); d.innerHTML = html || ''; return d.textContent || ''; }
function norm(s){ return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

var LS = 'cuaderno_data_v1';
var state = null, saveT = null, popEl = null, modalEl = null, fmtEl = null, selT = null;


  var dragId = null, dropT = null;
var slash = { open:false, blockId:null, filter:'', idx:0, items:[] };

/* ---------- historial para Deshacer y Rehacer ---------- */
var undoStack = [];
var redoStack = [];
var undoTypingActive = false;
var undoTypingTimer = null;
var MAX_UNDO_STEPS = 100;

/* ---------- última celda activa de una tabla ---------- */
var activeTableCell = {
  blockId: null,
  row: -1,
  column: -1
};

  

var contentEl = document.getElementById('content');
var topbarEl  = document.getElementById('topbar');
var sidebarEl = document.getElementById('sidebar');

var COVERS = [
  'linear-gradient(135deg,#667eea,#764ba2)',
  'linear-gradient(135deg,#f6d365,#fda085)',
  'linear-gradient(135deg,#84fab0,#8fd3f4)',
  'linear-gradient(135deg,#fa709a,#fee140)',
  'linear-gradient(135deg,#30cfd0,#330867)',
  'linear-gradient(135deg,#a8edea,#fed6e3)',
  'linear-gradient(135deg,#5ee7df,#b490ca)',
  'linear-gradient(135deg,#0ba360,#3cba92)',
  'linear-gradient(135deg,#f83600,#f9d423)',
  'linear-gradient(135deg,#2c3e50,#4ca1af)',
  'linear-gradient(135deg,#141e30,#243b55)',
  'linear-gradient(135deg,#e0c3fc,#8ec5fc)'
];

var EMOJIS = ('😀 😄 😁 🙂 😉 😊 🤩 🤔 😴 🙃 😅 🥳 👍 👏 🙌 🤝 💪 🧠 👀 ✍️ ❤️ 💛 💚 💙 💜 🧡 ⭐ 🌟 ✨ 🔥 🎯 🎉 🎁 🎨 🎵 🎬 📌 📍 📎 ✏️ 📝 📚 📖 📓 📒 📁 🗂️ 🗓️ ⏰ ⌛ 💡 🔑 🔒 🔍 🧮 📐 📏 📊 📈 🧪 🔬 ⚙️ 🛠️ 💻 🖥️ ⌨️ 🖱️ 🌐 ✅ ❌ ⚠️ ❓ ❗ ➕ ➗ ♟️ 🏆 🥇 🎓 🏠 🏫 🌍 🌱 🌳 🌸 🌞 🌙 ☕ 🍎 🍕 ⚽').split(' ');

var SLASH_ITEMS = [
  {type:'text',    ic:'T',           label:'Texto',            desc:'Un párrafo simple',            kw:'texto parrafo normal'},
  {type:'h1',      ic:'H1',          label:'Encabezado 1',     desc:'Título de sección grande',     kw:'encabezado titulo grande h1'},
  {type:'h2',      ic:'H2',          label:'Encabezado 2',     desc:'Título mediano',               kw:'encabezado h2 subtitulo'},
  {type:'h3',      ic:'H3',          label:'Encabezado 3',     desc:'Título pequeño',               kw:'encabezado h3'},
  {type:'bullet',  ic:'•',           label:'Lista de viñetas', desc:'Lista simple con puntos',      kw:'viñetas lista bullet puntos'},
  {type:'number',  ic:'1.',          label:'Lista numerada',   desc:'Lista con números',            kw:'numerada ordenada numeros'},
  {type:'todo',    ic:'☑',           label:'Lista de tareas',  desc:'Casillas para marcar',         kw:'tareas pendientes checkbox todo'},
  {type:'toggle',  ic:'<span class="toggle-menu-icon">▶</span>', label:'Desplegable', desc:'Oculta y muestra contenido', kw:'desplegable plegable toggle'},
  {type:'quote',   ic:'❝',           label:'Cita',             desc:'Destaca una cita',             kw:'cita quote'},
  {type:'callout', ic:'💡',          label:'Llamada',          desc:'Nota destacada con icono',     kw:'llamada nota aviso callout'},
  {type:'divider', ic:'—',           label:'Divisor',          desc:'Línea separadora',             kw:'divisor separador linea'},
  {type:'code',    ic:'&lt;/&gt;',   label:'Código',           desc:'Bloque monoespaciado',         kw:'codigo code programar'},
  {type:'image',   ic:'🖼',          label:'Imagen',           desc:'Desde una URL o un archivo',   kw:'imagen foto image'},
  {type:'table',   ic:'▦',           label:'Tabla',            desc:'Tabla simple editable',        kw:'tabla table celdas'},
  {type:'page',    ic:'📄',          label:'Página',           desc:'Crea una subpágina aquí',      kw:'pagina subpagina page nueva'}
];

/* ---------- estado y guardado ---------- */
function newBlock(type, text){ return { id:uid(), type: type || 'text', text: text || '', indent:0 }; }
function B(type, text, extra){ return Object.assign(newBlock(type, text), extra || {}); }
function createPage(parent){
  var p = { id:uid(), title:'', icon:'', cover:'', parent: parent || null, idx: Date.now() + Math.random(),
            font:'default', smallText:false, fullWidth:false, blocks:[newBlock()] };
  state.pages[p.id] = p;
  return p;
}
function cur(){ return state.pages[state.current]; }
function curBlocks(){ return cur().blocks; }
function byId(id){
  var bs = curBlocks();
  for(var i = 0; i < bs.length; i++){ if(bs[i].id === id) return bs[i]; }
  return null;
}
function blockOf(el){
  var w = el && el.closest ? el.closest('.block') : null;
  return w ? byId(w.dataset.id) : null;
}
function childrenOf(pid){
  var out = [];
  Object.keys(state.pages).forEach(function(k){
    var p = state.pages[k];
    if((p.parent || null) === (pid || null)) out.push(p);
  });
  out.sort(function(a, b){ return a.idx - b.idx; });
  return out;
}
function isEditableType(t){ return ['divider','image','table','page'].indexOf(t) === -1; }
function fixOrphans(){
  Object.keys(state.pages).forEach(function(k){
    var p = state.pages[k];
    if(p.parent && !state.pages[p.parent]) p.parent = null;
    if(!p.blocks || !p.blocks.length) p.blocks = [newBlock()];
  });
}
function load(){
  try{ state = JSON.parse(localStorage.getItem(LS)); }catch(e){ state = null; }
  if(!state || !state.pages || !Object.keys(state.pages).length){ seed(); return; }
  if(!state.trash) state.trash = [];
  if(!state.ui) state.ui = { expanded:{}, dark:false, side:false };
  if(!state.ui.expanded) state.ui.expanded = {};
  fixOrphans();
  if(!state.pages[state.current]){
    var r = childrenOf(null);
    state.current = r.length ? r[0].id : createPage(null).id;
  }
}
function saveNow(){
  clearTimeout(saveT);
  try{ localStorage.setItem(LS, JSON.stringify(state)); }
  catch(e){ console.warn('No se pudo guardar:', e); }
}
function save(){
  clearTimeout(saveT);
  saveT = setTimeout(function(){ saveNow(); flashSaved(); }, 400);
}



  function flashSaved(){
  var t = $('#savedTag'); if(!t) return;
  t.classList.add('show');
  clearTimeout(flashSaved.t);
  flashSaved.t = setTimeout(function(){ t.classList.remove('show'); }, 1300);
}

/* ---------- Deshacer y Rehacer ---------- */
function stateSnapshot(){
  return JSON.stringify(state);
}

function pushUndoSnapshot(){
  if(!state) return;

  var snapshot = stateSnapshot();
  var lastSnapshot = undoStack.length
    ? undoStack[undoStack.length - 1]
    : null;

  if(snapshot === lastSnapshot) return;

  undoStack.push(snapshot);

  if(undoStack.length > MAX_UNDO_STEPS){
    undoStack.shift();
  }

  redoStack = [];
}

function beginTypingHistory(){
  if(!undoTypingActive){
    pushUndoSnapshot();
    undoTypingActive = true;
  }

  clearTimeout(undoTypingTimer);

  undoTypingTimer = setTimeout(function(){
    undoTypingActive = false;
  }, 700);
}

function stopTypingHistory(){
  clearTimeout(undoTypingTimer);
  undoTypingActive = false;
}

function restoreSnapshot(snapshot){
  if(!snapshot) return;

  try{
    state = JSON.parse(snapshot);
  }catch(error){
    console.warn('No se pudo restaurar el historial:', error);
    return;
  }

  stopTypingHistory();
  closePopup();

  if(modalEl){
    closeModal();
  }

  if(fmtEl){
    fmtEl.hidden = true;
  }

  fixOrphans();
  applyTheme();
  renderAll();
  saveNow();
  flashSaved();
}

function undoAction(){
  if(!undoStack.length) return;

  var currentSnapshot = stateSnapshot();
  var previousSnapshot = undoStack.pop();

  redoStack.push(currentSnapshot);

  if(redoStack.length > MAX_UNDO_STEPS){
    redoStack.shift();
  }

  restoreSnapshot(previousSnapshot);
}

function redoAction(){
  if(!redoStack.length) return;

  var currentSnapshot = stateSnapshot();
  var nextSnapshot = redoStack.pop();

  undoStack.push(currentSnapshot);

  if(undoStack.length > MAX_UNDO_STEPS){
    undoStack.shift();
  }

  restoreSnapshot(nextSnapshot);
}

function applyTheme(){
  document.documentElement.dataset.theme = state.ui.dark ? 'dark' : 'light';
}


  

/* ---------- contenido inicial ---------- */
function seed(){
  state = { pages:{}, trash:[], current:null, ui:{ expanded:{}, dark:false, side:false } };
  var w = createPage(null);
  w.title = 'Bienvenido a Cuaderno'; w.icon = '👋'; w.cover = COVERS[4];
  w.blocks = [
    B('callout','Todo lo que ves es <b>editable</b>. Tus datos se guardan solo en este navegador: usa <b>Exportar copia</b> (abajo a la izquierda) para respaldarlos.', {emoji:'💾'}),
    B('h2','Lo básico'),
    B('bullet','Haz clic en cualquier parte y escribe.'),
    B('bullet','Escribe <b>/</b> para abrir el menú de bloques: títulos, listas, tablas, imágenes, código…'),
    B('bullet','Selecciona texto para dar formato: <b>negrita</b>, <i>cursiva</i>, <u>subrayado</u>, <s>tachado</s>.'),
    B('bullet','Arrastra <b>⋮⋮</b> para mover un bloque; haz clic en <b>⋮⋮</b> para convertirlo, duplicarlo o eliminarlo.'),
    B('bullet','Con <b>Tab</b> anidas un bloque y con <b>Mayús + Tab</b> lo sacas.'),
    B('h2','Atajos de Markdown'),
    B('text','Escríbelos al inicio de una línea vacía, seguidos de un espacio:'),
    B('code','# Encabezado 1\n## Encabezado 2\n### Encabezado 3\n- Lista de viñetas\n1. Lista numerada\n[] Lista de tareas\n> Cita\n---   (divisor, sin espacio)\n```   (bloque de código, sin espacio)'),
    B('h2','Prueba estos bloques'),
    B('todo','Marcar esta tarea'),
    B('todo','Esta ya está hecha', {checked:true}),
    B('toggle','Un desplegable: haz clic en la flecha'),
    B('text','Este bloque está anidado dentro del desplegable y se oculta al plegarlo.', {indent:1}),
    B('quote','Aquí puedes guardar tus citas favoritas.'),
    B('divider'),
    B('text','Crea subpáginas desde la barra lateral (botón <b>＋</b> al pasar el cursor sobre una página) o escribiendo <b>/pagina</b>.')
  ];
  var t = createPage(w.id);
  t.title = 'Ejemplo: lista de tareas'; t.icon = '✅';
  t.blocks = [
    B('todo','Preparar la clase de Cálculo'),
    B('todo','Revisar los exámenes de MBI'),
    B('todo','Resolver 3 ejercicios del Pájaro Carpintero ♟️')
  ];
  var n = createPage(null);
  n.title = 'Notas rápidas'; n.icon = '📝';
  state.current = w.id;
  state.ui.expanded[w.id] = true;
  saveNow();
}

/* ---------- barra lateral ---------- */
function renderSidebar(){
  var tn = state.trash.length;
  var h = '';
  h += '<div class="side-head"><span class="logo">📓 Cuaderno</span><button id="collapseBtn" title="Ocultar barra lateral">«</button></div>';
  h += '<button class="side-search" id="btnSearch">🔍 Buscar <kbd>Ctrl K</kbd></button>';
  h += '<div class="side-label">Páginas</div>';
  h += '<div id="pagelist">' + treeHtml(null, 0) + '</div>';
  h += '<button class="side-new" id="btnNewPage">＋ Nueva página</button>';
  h += '<div class="side-foot">'
    +  '<button id="btnTheme" title="Modo claro / oscuro">🌓</button>'
    +  '<button id="btnExport" title="Exportar copia de seguridad (JSON)">⬇️</button>'
    +  '<button id="btnImport" title="Importar copia de seguridad">⬆️</button>'
    +  '<button id="btnTrash" title="Papelera">🗑️' + (tn ? '<span class="tbadge">' + tn + '</span>' : '') + '</button>'
    +  '</div>';
  sidebarEl.innerHTML = h;
}
function treeHtml(parent, depth){
  return childrenOf(parent).map(function(p){
    var kids = childrenOf(p.id);
    var open = !!state.ui.expanded[p.id];
    var h = '<div class="prow' + (p.id === state.current ? ' active' : '') + '" data-id="' + p.id + '" style="padding-left:' + (6 + depth * 14) + 'px">'
      + '<span class="arrow' + (kids.length ? '' : ' nok') + (open ? ' open' : '') + '">▶</span>'
      + '<span class="picon">' + (p.icon || '📄') + '</span>'
      + '<span class="ptext">' + (esc(p.title) || 'Sin título') + '</span>'
      + '<span class="pacts"><button class="pa-add" title="Añadir subpágina">＋</button><button class="pa-del" title="Enviar a la papelera">🗑</button></span>'
      + '</div>';
    if(open && kids.length) h += treeHtml(p.id, depth + 1);
    return h;
  }).join('');
}
function openPage(id){
  if(!state.pages[id]) return;
  state.current = id;
  closePopup();
  renderAll();
  contentEl.scrollTop = 0;
  save();
}
function newPageFlow(parent){
  var p = createPage(parent);
  if(parent) state.ui.expanded[parent] = true;
  state.current = p.id;
  renderAll();
  requestAnimationFrame(function(){ var t = $('#ptitle'); if(t) t.focus(); });
  save();
}
function toggleSidebar(){
  if(window.innerWidth <= 760){
    document.body.classList.toggle('mopen');
  } else {
    state.ui.side = !state.ui.side;
    document.body.classList.toggle('sclosed', state.ui.side);
    save();
  }
}

/* ---------- página ---------- */
function renderAll(){ renderSidebar(); renderPage(); }
function padClasses(p){
  return 'font-' + (p.font || 'default') + (p.smallText ? ' small' : '') + (p.fullWidth ? ' full' : '');
}
function crumbHtml(){
  var chain = [], p = cur(), guard = 0;
  while(p && guard++ < 25){ chain.unshift(p); p = p.parent ? state.pages[p.parent] : null; }
  return chain.map(function(pg, i){
    return (i ? '<span class="csep">/</span>' : '')
      + '<button class="crumb" data-id="' + pg.id + '">' + (pg.icon ? pg.icon + ' ' : '') + (esc(pg.title) || 'Sin título') + '</button>';
  }).join('');
}
function renderPage(){
  var p = cur();
  document.title = (p.title || 'Sin título') + ' · Cuaderno';
  topbarEl.innerHTML =
    '<button id="sbToggle" title="Mostrar / ocultar barra lateral">☰</button>'
    + '<div id="crumbs">' + crumbHtml() + '</div>'
    + '<span id="savedTag">Guardado ✓</span>'
    + '<button id="pageMenuBtn" title="Opciones de la página">⋯</button>';
  var h = '';
  if(p.cover){
    h += '<div id="cover" style="background:' + p.cover + '"><div class="cover-acts"><button id="coverChange">Cambiar</button><button id="coverRemove">Quitar</button></div></div>';
  }
  h += '<div id="pagepad" class="' + padClasses(p) + '">'
    +  '<div id="phead" class="' + (p.cover ? 'hascover' : '') + '">'
    +    '<div class="ghosts">'
    +      (p.icon ? '' : '<button id="addIcon">😀 Añadir icono</button>')
    +      (p.cover ? '' : '<button id="addCover">🖼️ Añadir portada</button>')
    +    '</div>'
    +    (p.icon ? '<button id="picon" title="Cambiar icono">' + p.icon + '</button>' : '')
    +    '<div id="ptitle" contenteditable="true" data-ph="Sin título">' + esc(p.title) + '</div>'
    +  '</div>'
    +  '<div id="blocks"></div>'
    +  '<div id="pagebottom"></div>'
    + '</div>';
  contentEl.innerHTML = h;
  renderBlocks();
}

/* ---------- bloques ---------- */
function visibleBlocks(){
  var out = [], bs = curBlocks();
  for(var i = 0; i < bs.length; i++){
    var b = bs[i];
    out.push(b);
    if(b.type === 'toggle' && b.collapsed){
      var j = i + 1;
      while(j < bs.length && (bs[j].indent || 0) > (b.indent || 0)) j++;
      i = j - 1;
    }
  }
  return out;
}
function renderBlocks(){
  var c = $('#blocks'); if(!c) return;
  c.innerHTML = '';
  visibleBlocks().forEach(function(b){ c.appendChild(blockEl(b)); });
  renumber();
}
function renumber(){
  var counters = {};
  $$('#blocks .block').forEach(function(w){
    var ind = +w.dataset.indent || 0;
    Object.keys(counters).forEach(function(k){ if(+k > ind) delete counters[k]; });
    if(w.dataset.type === 'number'){
      counters[ind] = (counters[ind] || 0) + 1;
      var m = w.querySelector('.marker');
      if(m) m.textContent = counters[ind] + '.';
    } else {
      delete counters[ind];
    }
  });
}
function blockEl(b){
  var w = document.createElement('div');
  w.className = 'block';
  w.dataset.id = b.id;
  w.dataset.type = b.type;
  w.dataset.indent = b.indent || 0;
  w.style.paddingLeft = ((b.indent || 0) * 26) + 'px';
  var phMap = {
    text:'Escribe algo, o pulsa «/» para ver los bloques',
    h1:'Encabezado 1', h2:'Encabezado 2', h3:'Encabezado 3',
    bullet:'Elemento', number:'Elemento', todo:'Tarea',
    toggle:'Desplegable', quote:'Cita', callout:'Escribe una nota…'
  };
  var ph = phMap[b.type] || '';
  function ce(cls){
    return '<div class="bc ' + cls + '" contenteditable="true" data-ph="' + ph + '">' + (b.text || '') + '</div>';
  }
  var inner = '';
  switch(b.type){
    case 'h1': inner = ce('t-h1'); break;
    case 'h2': inner = ce('t-h2'); break;
    case 'h3': inner = ce('t-h3'); break;
    case 'quote': inner = ce('t-quote'); break;
    case 'bullet': inner = '<div class="brow"><div class="marker">•</div>' + ce('') + '</div>'; break;
    case 'number': inner = '<div class="brow"><div class="marker num"></div>' + ce('') + '</div>'; break;
    case 'todo':
      inner = '<div class="brow"><input type="checkbox" class="todo-check"' + (b.checked ? ' checked' : '') + '>' + ce(b.checked ? 'done' : '') + '</div>';
      break;
    case 'toggle':

    case 'code': inner = '<div class="bc code" contenteditable="true" spellcheck="false" data-ph=""></div>'; break;

        ? '<div class="imgwrap"><img src="' + String(b.url).replace(/"/g, '&quot;') + '" draggable="false"><div class="iacts"><button class="i-change">Cambiar</button><button class="i-del">Quitar</button></div></div>'
        : '<button class="img-add">🖼️&nbsp; Añadir imagen</button>';
      break;
    case 'table': {

      var t = '<div class="tblwrap"><table><tbody>';
      rows.forEach(function(r){
        t += '<tr>' + r.map(function(cell){ return '<td contenteditable="true">' + (cell || '') + '</td>'; }).join('') + '</tr>';
      });
      t += '</tbody></table><div class="tacts"><button class="t-ar">＋ fila</button><button class="t-ac">＋ columna</button><button class="t-dr">－ fila</button><button class="t-dc">－ columna</button></div></div>';
      inner = t;
      break;
    }
    case 'page': {
      var cp = state.pages[b.pageId];
      inner = '<div class="pageblock"><span>' + (cp && cp.icon ? cp.icon : '📄') + '</span><span class="pbt">' + (cp ? (esc(cp.title) || 'Sin título') : '(página eliminada)') + '</span></div>';
      break;
    }
    default: inner = ce('t-text');
  }
  w.innerHTML = '<div class="bh"><button class="badd" title="Añadir un bloque debajo">＋</button><button class="bdrag" draggable="true" title="Arrastrar para mover · Clic: menú">⋮⋮</button></div><div class="bm">' + inner + '</div>';
  if(b.type === 'code'){ w.querySelector('.bc').textContent = b.text || ''; }
  return w;
}

/* ---------- cursor y foco ---------- */
function setCaret(el, pos){
  el.focus();
  var r = document.createRange();
  r.selectNodeContents(el);
  r.collapse(pos === 'start');
  var s = window.getSelection();
  s.removeAllRanges();
  s.addRange(r);
}
function caretTextOffset(el, n){
  el.focus();
  var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  var node, off = n;
  while((node = walker.nextNode())){
    if(off <= node.length){
      var r = document.createRange();
      r.setStart(node, off);
      r.collapse(true);
      var s = window.getSelection();
      s.removeAllRanges();
      s.addRange(r);
      return;
    }
    off -= node.length;
  }
  setCaret(el, 'end');
}
function focusBlock(id, pos){
  requestAnimationFrame(function(){
    var el = $('.block[data-id="' + id + '"] .bc');
    if(el) setCaret(el, pos === 'start' ? 'start' : 'end');
  });
}
function caretAtStart(el){
  var s = window.getSelection();
  if(!s.rangeCount) return false;
  var r = s.getRangeAt(0);
  if(!r.collapsed) return false;
  if(!el.contains(r.startContainer)) return false;
  var pre = r.cloneRange();
  pre.selectNodeContents(el);
  pre.setEnd(r.startContainer, r.startOffset);
  return pre.toString() === '';
}
function caretAtEnd(el){
  var s = window.getSelection();
  if(!s.rangeCount) return false;
  var r = s.getRangeAt(0);
  if(!r.collapsed) return false;
  if(!el.contains(r.endContainer)) return false;
  var post = r.cloneRange();
  post.selectNodeContents(el);
  post.setStart(r.endContainer, r.endOffset);
  return post.toString() === '';
}
function prevEditable(bcEl){
  var w = bcEl.closest('.block').previousElementSibling;
  while(w && !w.querySelector('.bc')) w = w.previousElementSibling;
  return w ? w.querySelector('.bc') : null;
}
function nextEditable(bcEl){
  var w = bcEl.closest('.block').nextElementSibling;
  while(w && !w.querySelector('.bc')) w = w.nextElementSibling;
  return w ? w.querySelector('.bc') : null;
}

/* ---------- operaciones sobre bloques ---------- */
function removeBlock(b){
  var bs = curBlocks();
  var i = bs.indexOf(b);
  if(i > -1) bs.splice(i, 1);
  if(!bs.length) bs.push(newBlock());
}
function splitBlock(b, el){
  var s = window.getSelection();
  if(!s.rangeCount) return;
  var r = s.getRangeAt(0);
  var after = r.cloneRange();
  after.selectNodeContents(el);
  after.setStart(r.endContainer, r.endOffset);
  var frag = after.extractContents();
  var d = document.createElement('div');
  d.appendChild(frag);
  var trailing = d.innerHTML;
  if(trailing === '<br>') trailing = '';
  b.text = el.innerHTML;
  var nb;
  if(b.type === 'toggle'){
    b.collapsed = false;
    nb = newBlock('text', trailing);
    nb.indent = Math.min(6, (b.indent || 0) + 1);
  } else {
    var cont = ['bullet','number','todo','quote'].indexOf(b.type) > -1 ? b.type : 'text';
    nb = newBlock(cont, trailing);
    nb.indent = b.indent || 0;
  }
  var bs = curBlocks();
  bs.splice(bs.indexOf(b) + 1, 0, nb);
  renderBlocks();
  focusBlock(nb.id, 'start');
  save();
}
function backspaceAtStart(b, el){
  if(b.type !== 'text'){
    var keep = el.innerHTML;
    b.type = 'text';
    b.text = keep;
    delete b.checked; delete b.collapsed; delete b.emoji;
    renderBlocks();
    focusBlock(b.id, 'start');
    save();
    return;
  }
  if((b.indent || 0) > 0){
    b.indent--;
    var w0 = el.closest('.block');
    w0.style.paddingLeft = (b.indent * 26) + 'px';
    w0.dataset.indent = b.indent;
    renumber(); save();
    return;
  }
  var w = el.closest('.block');
  var pw = w.previousElementSibling;
  if(!pw) return;
  var pb = byId(pw.dataset.id);
  if(!pb) return;
  if(!isEditableType(pb.type)){
    if(el.textContent === ''){
      removeBlock(b); renderBlocks(); save();
    } else if(pb.type === 'divider'){
      removeBlock(pb); renderBlocks(); focusBlock(b.id, 'start'); save();
    }
    return;
  }
  if(pb.type === 'code'){
    if(el.textContent === ''){
      removeBlock(b); renderBlocks(); focusBlock(pb.id, 'end'); save();
    }
    return;
  }
  var prevBc = pw.querySelector('.bc');
  var off = prevBc.textContent.length;
  pb.text = prevBc.innerHTML + el.innerHTML;
  removeBlock(b);
  renderBlocks(); save();
  requestAnimationFrame(function(){
    var nel = $('.block[data-id="' + pb.id + '"] .bc');
    if(nel) caretTextOffset(nel, off);
  });
}
function applyType(b, type){
  b.type = type;
  delete b.checked; delete b.collapsed;
  if(type === 'todo') b.checked = false;
  if(type === 'toggle') b.collapsed = false;
  if(type === 'callout' && !b.emoji) b.emoji = '💡';
  if(type === 'divider') b.text = '';
  if(type === 'code') b.text = plain(b.text);
  if(type === 'image'){ b.url = b.url || ''; b.text = ''; }
  if(type === 'table' && !b.rows) b.rows = [['',''],['','']];
  if(type === 'page'){
    var title = plain(b.text).trim();
    var p = createPage(state.current);
    p.title = title;
    state.ui.expanded[state.current] = true;
    b.pageId = p.id;
    b.text = '';
    renderSidebar();
  }
}
function afterTypeFocus(b){
  var bs = curBlocks();
  if(!isEditableType(b.type)){
    var i = bs.indexOf(b);
    var next = bs[i + 1];
    if(!next){ next = newBlock(); bs.splice(i + 1, 0, next); }
    renderBlocks();
    if(b.type === 'table'){
      requestAnimationFrame(function(){
        var td = $('.block[data-id="' + b.id + '"] td');
        if(td) setCaret(td, 'end');
      });
    } else if(b.type === 'image'){
      requestAnimationFrame(function(){ imagePopup(b); });
    } else if(isEditableType(next.type)){
      focusBlock(next.id, 'start');
    }
  } else {
    renderBlocks();
    focusBlock(b.id, plain(b.text) ? 'end' : 'start');
  }
  save();
}
function addBelow(b){
  var nb = newBlock('text', '');
  nb.indent = b.indent || 0;
  var bs = curBlocks();
  bs.splice(bs.indexOf(b) + 1, 0, nb);
  renderBlocks();
  requestAnimationFrame(function(){
    var el = $('.block[data-id="' + nb.id + '"] .bc');
    if(el){ setCaret(el, 'start'); openSlash(nb); }
  });
  save();
}

/* ---------- menú "/" ---------- */
function openSlash(b){
  var bcEl = $('.block[data-id="' + b.id + '"] .bc');
  if(!bcEl) return;
  var r = bcEl.getBoundingClientRect();
  var p = popup(r.left, r.bottom + 6, 'slashpop');
  slash = { open:true, blockId:b.id, filter:'', idx:0, items:[] };
  p.innerHTML = '<div class="plabel">Bloques básicos</div><div class="slist"></div>';
  renderSlashList();
  placePopup(r.left, r.bottom + 6);
}
function renderSlashList(){
  if(!popEl) return;
  var list = $('.slist', popEl);
  if(!list) return;
  var q = norm(slash.filter);
  slash.items = SLASH_ITEMS.filter(function(it){
    return !q || norm(it.label + ' ' + it.kw).indexOf(q) > -1;
  });
  if(slash.idx >= slash.items.length) slash.idx = 0;
  if(!slash.items.length){
    list.innerHTML = '<div class="pempty">Sin resultados</div>';
    return;
  }
  list.innerHTML = slash.items.map(function(it, i){
    return '<div class="pi' + (i === slash.idx ? ' sel' : '') + '" data-i="' + i + '"><span class="ic">' + it.ic + '</span><span class="pit">' + it.label + '<small>' + it.desc + '</small></span></div>';
  }).join('');
  $$('.pi', list).forEach(function(el){
    el.addEventListener('mouseenter', function(){ slash.idx = +el.dataset.i; markSlash(); });
    el.addEventListener('mousedown', function(e){ e.preventDefault(); slash.idx = +el.dataset.i; applySlash(); });
  });
  var sel = $('.pi.sel', list);
  if(sel) sel.scrollIntoView({ block:'nearest' });
}
function markSlash(){
  if(!popEl) return;
  $$('.slist .pi', popEl).forEach(function(el){
    el.classList.toggle('sel', +el.dataset.i === slash.idx);
  });
}
function moveSlash(d){
  if(!slash.items.length) return;
  slash.idx = (slash.idx + d + slash.items.length) % slash.items.length;
  markSlash();
  var sel = $('.slist .pi.sel', popEl);
  if(sel) sel.scrollIntoView({ block:'nearest' });
}
function applySlash(){
  var it = slash.items[slash.idx];
  var b = byId(slash.blockId);
  closeSlashOnly();
  if(!it || !b) return;
  var el = $('.block[data-id="' + b.id + '"] .bc');
  if(el){
    if(el.textContent.indexOf('/') === 0) b.text = '';
    else b.text = el.innerHTML;
  }
  applyType(b, it.type);
  afterTypeFocus(b);
}
function closeSlashOnly(){
  slash.open = false;
  if(popEl && popEl.classList.contains('slashpop')){
    popEl.remove();
    popEl = null;
  }
}

/* ---------- popups genéricos ---------- */
function closePopup(){
  slash.open = false;
  if(popEl){ popEl.remove(); popEl = null; }
}
function popup(x, y, cls){
  closePopup();
  popEl = document.createElement('div');
  popEl.className = 'pop ' + (cls || '');
  popEl.style.left = x + 'px';
  popEl.style.top = y + 'px';
  document.body.appendChild(popEl);
  return popEl;
}
function placePopup(x, y){
  if(!popEl) return;
  var wpx = popEl.offsetWidth, hpx = popEl.offsetHeight;
  var nx = Math.min(x, window.innerWidth - wpx - 10);
  if(nx < 8) nx = 8;
  var ny = y;
  if(y + hpx > window.innerHeight - 10) ny = Math.max(10, y - hpx - 34);
  popEl.style.left = nx + 'px';
  popEl.style.top = ny + 'px';
}
document.addEventListener('mousedown', function(e){
  if(popEl && !popEl.contains(e.target)) closePopup();
}, true);

/* ---------- eventos: escritura ---------- */
var MD_RULES = [
  [/^###\s/, 'h3'], [/^##\s/, 'h2'], [/^#\s/, 'h1'],
  [/^\[\]\s/, 'todo'], [/^-\s/, 'bullet'], [/^\*\s/, 'bullet'],
  [/^\d+\.\s/, 'number'], [/^>\s/, 'quote']
];
function onBcInput(el){
  var b = blockOf(el);
  if(!b) return;
  if(el.innerHTML === '<br>' || el.innerHTML === '<div><br></div>') el.innerHTML = '';
  if(b.type === 'code'){ b.text = el.textContent; save(); return; }
  var t = el.textContent;
  if(t.indexOf('/') === 0){
    if(!slash.open || slash.blockId !== b.id){
      b.text = el.innerHTML;
      openSlash(b);
    }
    slash.filter = t.slice(1);
    renderSlashList();
    b.text = el.innerHTML;
    save();
    return;
  } else if(slash.open && slash.blockId === b.id){
    closeSlashOnly();
  }
  if(b.type === 'text'){
    if(t === '---'){ b.text = ''; applyType(b, 'divider'); afterTypeFocus(b); return; }
    if(t === '```'){
      b.text = '';
      applyType(b, 'code');
      renderBlocks(); focusBlock(b.id, 'start'); save();
      return;
    }
    for(var i = 0; i < MD_RULES.length; i++){
      var re = MD_RULES[i][0], ty = MD_RULES[i][1];
      if(re.test(t)){
        b.text = esc(t.replace(re, ''));
        applyType(b, ty);
        renderBlocks(); focusBlock(b.id, 'end'); save();
        return;
      }
    }
  }
  b.text = el.innerHTML;
  save();
}
contentEl.addEventListener('input', function(e){
  var t = e.target;
  if(t.id === 'ptitle'){
    var p = cur();
    p.title = t.textContent.replace(/\n/g, ' ');
    var row = $('.prow[data-id="' + p.id + '"] .ptext', sidebarEl);
    if(row) row.textContent = p.title || 'Sin título';
    var crumbs = $$('#crumbs .crumb');
    var lastCrumb = crumbs[crumbs.length - 1];
    if(lastCrumb) lastCrumb.textContent = (p.icon ? p.icon + ' ' : '') + (p.title || 'Sin título');
    document.title = (p.title || 'Sin título') + ' · Cuaderno';
    save();
    return;
  }
  if(t.tagName === 'TD'){
    var b = blockOf(t);
    if(!b || !b.rows) return;
    var tr = t.parentElement;
    var ri = Array.prototype.indexOf.call(tr.parentElement.children, tr);
    var ci = Array.prototype.indexOf.call(tr.children, t);
    if(b.rows[ri] !== undefined) b.rows[ri][ci] = t.innerHTML;
    save();
    return;
  }
  var bc = t.closest ? t.closest('.bc') : null;
  if(bc) onBcInput(bc);
});
contentEl.addEventListener('keydown', function(e){
  var t = e.target;
  if(t.id === 'ptitle'){
    if(e.key === 'Enter' || (e.key === 'ArrowDown' && caretAtEnd(t))){
      e.preventDefault();
      var f = curBlocks()[0];
      if(f && isEditableType(f.type)) focusBlock(f.id, 'start');
    }
    return;
  }
  if(t.tagName === 'TD'){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      var tr = t.parentElement;
      var ci = Array.prototype.indexOf.call(tr.children, t);
      var nr = tr.nextElementSibling;
      if(nr && nr.children[ci]) setCaret(nr.children[ci], 'end');
    }
    return;
  }
  var bc = t.closest ? t.closest('.bc') : null;
  if(!bc) return;
  var b = blockOf(bc);
  if(!b) return;
  if(slash.open && slash.blockId === b.id){
    if(e.key === 'ArrowDown'){ e.preventDefault(); moveSlash(1); return; }
    if(e.key === 'ArrowUp'){ e.preventDefault(); moveSlash(-1); return; }
    if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); applySlash(); return; }
    if(e.key === 'Escape'){ e.preventDefault(); closeSlashOnly(); return; }
  }
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    if(b.type === 'code'){ document.execCommand('insertText', false, '\n'); return; }
    var empty = bc.textContent === '';
    if(empty && ['bullet','number','todo','toggle','quote','callout'].indexOf(b.type) > -1){
      if((b.indent || 0) > 0){
        b.indent--;
        var w0 = bc.closest('.block');
        w0.style.paddingLeft = (b.indent * 26) + 'px';
        w0.dataset.indent = b.indent;
        renumber(); save();
      } else {
        b.type = 'text'; b.text = '';
        delete b.checked; delete b.collapsed;
        renderBlocks(); focusBlock(b.id, 'start'); save();
      }
      return;
    }
    splitBlock(b, bc);
    return;
  }
  if(e.key === 'Backspace' && caretAtStart(bc)){
    e.preventDefault();
    backspaceAtStart(b, bc);
    return;
  }
  if(e.key === 'Tab'){
    e.preventDefault();
    var d = e.shiftKey ? -1 : 1;
    var ni = Math.min(6, Math.max(0, (b.indent || 0) + d));
    if(ni !== (b.indent || 0)){
      b.indent = ni;
      var w1 = bc.closest('.block');
      w1.style.paddingLeft = (ni * 26) + 'px';
      w1.dataset.indent = ni;
      renumber(); save();
    }
    return;
  }
  if((e.key === 'ArrowUp' || e.key === 'ArrowLeft') && caretAtStart(bc)){
    var pv = prevEditable(bc);
    if(pv){ e.preventDefault(); setCaret(pv, 'end'); }
    return;
  }
  if((e.key === 'ArrowDown' || e.key === 'ArrowRight') && caretAtEnd(bc)){
    var nx = nextEditable(bc);
    if(nx){ e.preventDefault(); setCaret(nx, 'start'); }
    return;
  }
});
function lineToBlock(line){
  var tests = [
    [/^###\s+/, 'h3'], [/^##\s+/, 'h2'], [/^#\s+/, 'h1'],
    [/^-\s+\[x\]\s*/i, 'todox'], [/^-\s+\[\s?\]\s*/, 'todo'],
    [/^[-*]\s+/, 'bullet'], [/^\d+[.)]\s+/, 'number'], [/^>\s+/, 'quote']
  ];
  for(var i = 0; i < tests.length; i++){
    var re = tests[i][0], ty = tests[i][1];
    if(re.test(line)){
      var checked = (ty === 'todox');
      if(checked) ty = 'todo';
      var nb = newBlock(ty, esc(line.replace(re, '')));
      if(ty === 'todo') nb.checked = checked;
      return nb;
    }
  }
  if(/^---+\s*$/.test(line)) return newBlock('divider', '');
  return newBlock('text', esc(line));
}
contentEl.addEventListener('paste', function(e){
  var t = e.target;
  var isTitle = (t.id === 'ptitle');
  var td = (t.tagName === 'TD') ? t : (t.closest ? t.closest('td') : null);
  var bc = t.closest ? t.closest('.bc') : null;
  if(!isTitle && !td && !bc) return;
  e.preventDefault();
  var txt = (e.clipboardData || window.clipboardData).getData('text/plain');
  if(!txt) return;
  if(isTitle || td){
    document.execCommand('insertText', false, txt.replace(/\s*\n+\s*/g, ' '));
    return;
  }
  var b = blockOf(bc);
  if(b && b.type !== 'code' && txt.indexOf('\n') > -1){
    var lines = txt.split(/\r?\n/);
    document.execCommand('insertText', false, lines[0]);
    b.text = bc.innerHTML;
    var bs = curBlocks();
    var at = bs.indexOf(b) + 1;
    for(var i = 1; i < lines.length; i++){
      var nb = lineToBlock(lines[i]);
      nb.indent = b.indent || 0;
      bs.splice(at++, 0, nb);
    }
    renderBlocks();
    var last = bs[at - 1];
    if(last && isEditableType(last.type)) focusBlock(last.id, 'end');
    save();
    return;
  }
  document.execCommand('insertText', false, txt);
});
function clickBottom(){
  var bs = curBlocks();
  var last = bs[bs.length - 1];
  if(last && last.type === 'text' && plain(last.text).trim() === ''){
    focusBlock(last.id, 'end');
  } else {
    var nb = newBlock();
    bs.push(nb);
    renderBlocks();
    focusBlock(nb.id, 'start');
    save();
  }
}

contentEl.addEventListener('dragstart', function(e){
  var h = e.target.closest ? e.target.closest('.bdrag') : null;
  if(!h) return;
  var w = h.closest('.block');
  dragId = w.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  try{ e.dataTransfer.setData('text/plain', 'bloque'); }catch(err){}
  w.classList.add('dragging');
});
function clearDrop(){
  $$('#blocks .block').forEach(function(w){ w.classList.remove('drop-before', 'drop-after'); });
}
contentEl.addEventListener('dragover', function(e){
  if(!dragId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  clearDrop();
  var w = e.target.closest ? e.target.closest('.block') : null;
  if(!w || w.dataset.id === dragId){ dropT = null; return; }
  var r = w.getBoundingClientRect();
  var before = e.clientY < r.top + r.height / 2;
  w.classList.add(before ? 'drop-before' : 'drop-after');
  dropT = { id: w.dataset.id, before: before };
});
contentEl.addEventListener('drop', function(e){
  if(!dragId) return;
  e.preventDefault();
  if(dropT && dropT.id !== dragId){
    var bs = curBlocks();
    var src = byId(dragId);
    var si = bs.indexOf(src);
    if(si > -1){
      bs.splice(si, 1);
      var tgt = byId(dropT.id);
      var ti = bs.indexOf(tgt);
      if(ti > -1){
        bs.splice(dropT.before ? ti : ti + 1, 0, src);
        renderBlocks(); save();
      } else {
        bs.splice(si, 0, src);
      }
    }
  }
  endDrag();
});
contentEl.addEventListener('dragend', endDrag);
function endDrag(){
  dragId = null;
  dropT = null;
  clearDrop();
  $$('#blocks .block.dragging').forEach(function(w){ w.classList.remove('dragging'); });
}

function initFmt(){

    + '<button data-c="underline" title="Subrayado (Ctrl+U)"><u>U</u></button>'
    + '<button data-c="strikeThrough" title="Tachado"><s>S</s></button>'
    + '<button data-c="code" title="Código en línea">&lt;/&gt;</button>'
    + '<button data-c="link" title="Enlace (se abre con Ctrl+clic)">🔗</button>';
  document.body.appendChild(fmtEl);
  fmtEl.addEventListener('mousedown', function(e){
    e.preventDefault();
    var bt = e.target.closest('button');
    if(!bt) return;

      wrapInlineCode();
    } else if(c === 'link'){
      var u = prompt('Dirección del enlace:', 'https://');
      if(u && u !== 'https://') document.execCommand('createLink', false, u);
    } else {
      document.execCommand(c, false, null);
    }
    syncActiveBlock();
  });
}
function wrapInlineCode(){
  var s = window.getSelection();
  if(!s.rangeCount || s.isCollapsed) return;
  var r = s.getRangeAt(0);
  try{
    var c = document.createElement('code');
    r.surroundContents(c);
  }catch(err){
    document.execCommand('insertHTML', false, '<code>' + esc(s.toString()) + '</code>');
  }
}
function syncActiveBlock(){
  var s = window.getSelection();
  if(!s.rangeCount) return;
  var n = s.anchorNode;
  if(!n) return;
  if(n.nodeType !== 1) n = n.parentElement;
  var bc = (n && n.closest) ? n.closest('.bc') : null;
  if(!bc) return;
  var b = blockOf(bc);
  if(b){
    b.text = (b.type === 'code') ? bc.textContent : bc.innerHTML;
    save();
  }
}
document.addEventListener('selectionchange', function(){
  clearTimeout(selT);
  selT = setTimeout(updateFmt, 120);
});
function updateFmt(){
  if(!fmtEl) return;
  var s = window.getSelection();
  if(!s.rangeCount || s.isCollapsed){ fmtEl.hidden = true; return; }
  var n = s.anchorNode;
  if(n && n.nodeType !== 1) n = n.parentElement;
  var bc = (n && n.closest) ? n.closest('.bc') : null;
  if(!bc || bc.classList.contains('code') || !contentEl.contains(bc)){ fmtEl.hidden = true; return; }
  var r = s.getRangeAt(0).getBoundingClientRect();
  if(!r || (r.top === 0 && r.left === 0)){ fmtEl.hidden = true; return; }
  fmtEl.hidden = false;
  var top = Math.max(8, r.top - 42);
  var left = Math.min(window.innerWidth - fmtEl.offsetWidth - 8, Math.max(8, r.left));
  fmtEl.style.top = top + 'px';
  fmtEl.style.left = left + 'px';
}
contentEl.addEventListener('scroll', function(){ if(fmtEl) fmtEl.hidden = true; }, { passive:true });

/* ---------- papelera ---------- */
function subtreePages(id){
  var out = [state.pages[id]];
  childrenOf(id).forEach(function(c){
    out = out.concat(subtreePages(c.id));
  });
  return out;
}
function confirmTrash(id){
  var p = state.pages[id];
  if(!p) return;
  var n = subtreePages(id).length;
  var msg = (n > 1)
    ? '¿Enviar «' + (p.title || 'Sin título') + '» y sus ' + (n - 1) + ' subpáginas a la papelera?'
    : '¿Enviar «' + (p.title || 'Sin título') + '» a la papelera?';
  if(!confirm(msg)) return;
  trashPage(id);
}
function trashPage(id){
  var pgs = subtreePages(id).filter(Boolean);
  var root = state.pages[id];
  state.trash.unshift({
    id: uid(), rootId: id, title: root.title, icon: root.icon,
    ts: Date.now(), pages: JSON.parse(JSON.stringify(pgs))
  });
  pgs.forEach(function(pg){
    delete state.pages[pg.id];
    delete state.ui.expanded[pg.id];
  });
  if(!state.pages[state.current]){
    var roots = childrenOf(null);
    state.current = roots.length ? roots[0].id : createPage(null).id;
  }
  closeModal();
  renderAll(); save();
}
function buildModal(){
  closeModal();
  closePopup();
  modalEl = document.createElement('div');
  modalEl.className = 'mback';
  modalEl.innerHTML = '<div class="mcard"></div>';
  modalEl.addEventListener('mousedown', function(e){
    if(e.target === modalEl) closeModal();
  });
  document.body.appendChild(modalEl);
  return modalEl;
}
function closeModal(){
  if(modalEl){ modalEl.remove(); modalEl = null; }
}
function openTrash(){
  var back = buildModal();
  var card = $('.mcard', back);
  function render(){
    var h = '<div class="mtitle">🗑️ Papelera</div><div class="mlist">';
    if(!state.trash.length) h += '<div class="pempty">La papelera está vacía.</div>';
    state.trash.forEach(function(en, i){
      h += '<div class="mrow" data-i="' + i + '"><span>' + (en.icon || '📄') + '</span><span class="mtxt"><b>' + (esc(en.title) || 'Sin título') + '</b><small>'
        + new Date(en.ts).toLocaleDateString('es-PE', { day:'numeric', month:'short', year:'numeric' })
        + (en.pages.length > 1 ? ' · ' + en.pages.length + ' páginas' : '')
        + '</small></span><span class="macts"><button data-a="res">Restaurar</button><button data-a="kill" title="Eliminar definitivamente">✖</button></span></div>';
    });
    h += '</div>';
    if(state.trash.length) h += '<div class="mfoot"><button id="emptyTrash">Vaciar papelera</button></div>';
    card.innerHTML = h;
    $$('.mrow', card).forEach(function(row){
      row.querySelector('[data-a="res"]').addEventListener('click', function(){
        var en = state.trash[+row.dataset.i];
        if(!en) return;
        en.pages.forEach(function(pg){ state.pages[pg.id] = pg; });
        var rp = state.pages[en.rootId];
        if(rp && rp.parent && !state.pages[rp.parent]) rp.parent = null;
        state.trash.splice(+row.dataset.i, 1);
        renderAll(); save(); render();
      });
      row.querySelector('[data-a="kill"]').addEventListener('click', function(){
        if(!confirm('¿Eliminar definitivamente? Esta acción no se puede deshacer.')) return;
        state.trash.splice(+row.dataset.i, 1);
        renderSidebar(); save(); render();
      });
    });
    var et = $('#emptyTrash', card);
    if(et) et.addEventListener('click', function(){
      if(!confirm('¿Vaciar toda la papelera? Esta acción no se puede deshacer.')) return;
      state.trash = [];
      renderSidebar(); save(); render();
    });
  }
  render();
}

/* ---------- buscador ---------- */
function openSearch(){
  var back = buildModal();
  var card = $('.mcard', back);
  card.innerHTML = '<input type="text" id="searchIn" placeholder="Buscar en todas las páginas…"><div class="mlist" id="searchRes"></div>';
  var input = $('#searchIn', card), res = $('#searchRes', card);
  function pageText(p){
    return p.blocks.map(function(b){
      if(b.type === 'table') return (b.rows || []).map(function(r){ return r.map(plain).join(' '); }).join(' ');
      return (b.type === 'code') ? (b.text || '') : plain(b.text);
    }).join(' ');
  }
  function render(){
    var q = norm(input.value.trim());
    var items = [];
    Object.keys(state.pages).forEach(function(k){
      var p = state.pages[k];
      var title = p.title || 'Sin título';
      if(!q){ items.push({ p:p, snip:'', score:1 }); return; }
      var inTitle = norm(title).indexOf(q) > -1;
      var body = pageText(p);
      var bi = norm(body).indexOf(q);
      if(inTitle || bi > -1){
        var snip = '';
        if(bi > -1){
          var start = Math.max(0, bi - 25);
          snip = (start > 0 ? '…' : '') + body.slice(start, bi + 55).trim() + '…';
        }
        items.push({ p:p, snip:snip, score: inTitle ? 0 : 1 });
      }
    });
    items.sort(function(a, b){ return a.score - b.score || b.p.idx - a.p.idx; });
    items = items.slice(0, 14);
    if(!items.length){
      res.innerHTML = '<div class="pempty">No se encontró nada con «' + esc(input.value) + '».</div>';
      return;
    }
    res.innerHTML = items.map(function(it){
      return '<div class="mrow" data-id="' + it.p.id + '"><span>' + (it.p.icon || '📄') + '</span><span class="mtxt"><b>' + (esc(it.p.title) || 'Sin título') + '</b>'
        + (it.snip ? '<small>' + esc(it.snip) + '</small>' : '')
        + '</span></div>';
    }).join('');

/* ---------- exportar e importar ---------- */
function downloadFile(name, mime, text){
  var blob = new Blob([text], { type: mime + ';charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 4000);
}
function exportJson(){
  saveNow();
  var data = { app:'cuaderno', version:1, exportado:new Date().toISOString(), pages:state.pages, trash:state.trash, current:state.current };
  var d = new Date();
  var fname = 'cuaderno-copia-' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + '.json';
  downloadFile(fname, 'application/json', JSON.stringify(data, null, 1));
}
function importJson(file){
  var rd = new FileReader();
  rd.onload = function(){
    try{
      var obj = JSON.parse(rd.result);
      if(!obj || !obj.pages || typeof obj.pages !== 'object' || !Object.keys(obj.pages).length) throw new Error('formato');
      if(!confirm('Esto reemplazará TODAS tus páginas actuales por las de la copia. ¿Continuar?')) return;
      state.pages = obj.pages;
      state.trash = obj.trash || [];
      state.ui.expanded = {};
      fixOrphans();
      var roots = childrenOf(null);
      state.current = (obj.current && state.pages[obj.current]) ? obj.current : (roots.length ? roots[0].id : createPage(null).id);
      saveNow();
      renderAll();
    }catch(err){
      alert('No se pudo importar: el archivo no parece una copia válida de Cuaderno.');
    }
  };
  rd.readAsText(file);
}
function inlineMd(html){
  var s = String(html || '');
  s = s.replace(/<br\s*\/?>/gi, ' ');
  s = s.replace(/<\/?(b|strong)>/gi, '**');
  s = s.replace(/<\/?(i|em)>/gi, '*');
  s = s.replace(/<\/?(s|strike|del)>/gi, '~~');
  s = s.replace(/<code>/gi, '`').replace(/<\/code>/gi, '`');
  s = s.replace(/<a [^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi, '[$2]($1)');
  s = s.replace(/<[^>]+>/g, '');
  var d = document.createElement('textarea');
  d.innerHTML = s;
  return d.value;
}
function pageToMd(p){
  var out = ['# ' + (p.title || 'Sin título'), ''];
  p.blocks.forEach(function(b){
    var ind = new Array((b.indent || 0) + 1).join('  ');
    var t = inlineMd(b.text || '');
    var extraBlank = true;
    switch(b.type){
      case 'h1': out.push(ind + '# ' + t); break;
      case 'h2': out.push(ind + '## ' + t); break;
      case 'h3': out.push(ind + '### ' + t); break;
      case 'bullet': out.push(ind + '- ' + t); extraBlank = false; break;
      case 'number': out.push(ind + '1. ' + t); extraBlank = false; break;
      case 'todo': out.push(ind + '- [' + (b.checked ? 'x' : ' ') + '] ' + t); extraBlank = false; break;
      case 'toggle': out.push(ind + '- ▸ **' + t + '**'); extraBlank = false; break;
      case 'quote': out.push(ind + '> ' + t); break;
      case 'callout': out.push(ind + '> ' + (b.emoji || '💡') + ' ' + t); break;
      case 'divider': out.push(ind + '---'); break;
      case 'code':
        out.push(ind + '```');
        String(b.text || '').split('\n').forEach(function(l){ out.push(ind + l); });
        out.push(ind + '```');
        break;
      case 'image':
        out.push(ind + (b.url ? (b.url.indexOf('data:') === 0 ? '*(imagen incrustada)*' : '![imagen](' + b.url + ')') : '*(imagen)*'));
        break;
      case 'table':
        (b.rows || []).forEach(function(r, ri){
          out.push(ind + '| ' + r.map(inlineMd).join(' | ') + ' |');
          if(ri === 0) out.push(ind + '|' + r.map(function(){ return ' --- '; }).join('|') + '|');
        });
        break;
      case 'page': {
        var cp = state.pages[b.pageId];
        out.push(ind + '📄 ' + (cp ? ((cp.icon ? cp.icon + ' ' : '') + (cp.title || 'Sin título')) : '(página eliminada)'));
        break;
      }
      default: out.push(ind + t);
    }
    if(extraBlank) out.push('');
  });
  return out.join('\n');
}

blockMenu=function(b,x,y){var p=popup(x,y);p.innerHTML='<div class="pi" data-a="conv"><span class="ic">⇄</span><span class="pit">Convertir en…</span></div><div class="pi" data-a="comment"><span class="ic">💬</span><span class="pit">Agregar comentario</span></div><div class="pi" data-a="color"><span class="ic">A</span><span class="pit">Color</span></div><div class="pi" data-a="link"><span class="ic">🔗</span><span class="pit">Copiar enlace al bloque</span></div><div class="psep"></div><div class="pi" data-a="up"><span class="ic">↑</span><span class="pit">Mover arriba</span></div><div class="pi" data-a="down"><span class="ic">↓</span><span class="pit">Mover abajo</span></div><div class="pi" data-a="dup"><span class="ic">⧉</span><span class="pit">Duplicar</span></div><div class="psep"></div><div class="pi danger" data-a="del"><span class="ic">🗑</span><span class="pit">Eliminar</span></div>';placePopup(x,y);$$('.pi',p).forEach(function(el){el.onclick=function(){var a=el.dataset.a;if(a==='conv'){typeMenu(b,x,y);return}if(a==='color'){blockColorMenu(b,x,y);return}closePopup();var bs=curBlocks(),i=bs.indexOf(b);if(a==='comment'){openCommentsPanel(b.id,true)}if(a==='link'){copyText(pageLink(state.current)+'&block='+encodeURIComponent(b.id),'Enlace al bloque copiado')}if(a==='up'&&i>0){bs.splice(i,1);bs.splice(i-1,0,b);renderBlocks();save()}if(a==='down'&&i<bs.length-1){bs.splice(i,1);bs.splice(i+1,0,b);renderBlocks();save()}if(a==='dup'){var c=JSON.parse(JSON.stringify(b));c.id=uid();bs.splice(i+1,0,c);renderBlocks();save()}if(a==='del'){removeBlock(b);renderBlocks();save()}}});};

function selectedContext(){var s=window.getSelection();if(!s.rangeCount||s.isCollapsed)return null;var n=s.anchorNode;if(n.nodeType!==1)n=n.parentElement;var bc=n&&n.closest?n.closest('.bc'):null;if(!bc)return null;return {text:s.toString(),block:blockOf(bc)}}
function addComment(blockId,quote,text){var p=cur();if(!p.comments)p.comments=[];p.comments.push({id:uid(),blockId:blockId||null,quote:quote||'',text:text||'',author:'Tú',created:Date.now(),unread:false,muted:false});save();renderCommentMarkers()}
function openCommentsPanel(blockId,focusCompose){var old=$('#commentsPanel');if(old)old.remove();var panel=document.createElement('aside');panel.id='commentsPanel';panel.innerHTML='<div class="cpanel-head"><b>Comentarios</b><button id="closeComments">✕</button></div><div class="cpanel-list"></div><div class="cpanel-compose"><textarea id="commentText" placeholder="Agregar comentario…"></textarea><div class="row"><button id="sendComment">Comentar</button></div></div>';document.body.appendChild(panel);var list=$('.cpanel-list',panel),p=cur();function draw(){var arr=(p.comments||[]).filter(function(c){return !blockId||c.blockId===blockId});list.innerHTML=arr.length?arr.map(function(c){return '<div class="comment-card'+(c.unread?' unread':'')+(c.muted?' muted':'')+'" data-id="'+c.id+'"><div class="comment-meta"><b>'+esc(c.author||'Tú')+'</b><span>'+new Date(c.created).toLocaleString('es-PE')+'</span><span class="sp"></span><button class="cmenu">⋯</button></div>'+(c.quote?'<div class="comment-quote">“'+esc(c.quote)+'”</div>':'')+'<div class="comment-body">'+esc(c.text)+'</div></div>'}).join(''):'<div class="pempty">Todavía no hay comentarios.</div>';$$('.cmenu',list).forEach(function(bt){bt.onclick=function(e){var card=bt.closest('.comment-card'),c=(p.comments||[]).find(function(x){return x.id===card.dataset.id});var r=bt.getBoundingClientRect();commentMenu(c,r.left-190,r.bottom+4,draw)}})}draw();$('#closeComments',panel).onclick=function(){panel.remove()};$('#sendComment',panel).onclick=function(){var tx=$('#commentText',panel),v=tx.value.trim();if(!v)return;var sc=selectedContext();addComment(blockId||(sc&&sc.block&&sc.block.id),sc?sc.text:'',v);tx.value='';draw()};if(focusCompose)setTimeout(function(){$('#commentText',panel).focus()},30)}
function commentMenu(c,x,y,redraw){var p=popup(x,y);p.innerHTML='<div class="pi" data-a="unread"><span class="ic">●</span><span class="pit">Marcar como no leído</span></div><div class="pi" data-a="edit"><span class="ic">✎</span><span class="pit">Editar</span></div><div class="pi" data-a="link"><span class="ic">🔗</span><span class="pit">Copiar enlace</span></div><div class="pi" data-a="mute"><span class="ic">🔕</span><span class="pit">'+(c.muted?'Activar respuestas':'Silenciar respuestas')+'</span></div><div class="psep"></div><div class="pi danger" data-a="del"><span class="ic">🗑</span><span class="pit">Eliminar</span></div>';$$('.pi',p).forEach(function(el){el.onclick=function(){var a=el.dataset.a;closePopup();if(a==='unread')c.unread=true;if(a==='edit'){var v=prompt('Editar comentario:',c.text);if(v!==null)c.text=v}if(a==='link')copyText(pageLink(state.current)+'&comment='+encodeURIComponent(c.id),'Enlace al comentario copiado');if(a==='mute')c.muted=!c.muted;if(a==='del'){var arr=cur().comments||[],i=arr.indexOf(c);if(i>-1)arr.splice(i,1)}save();redraw();renderBlocks();renderCommentMarkers()}});placePopup(x,y)}

initFmt=function(){fmtEl=document.createElement('div');fmtEl.id='fmt';fmtEl.hidden=true;fmtEl.innerHTML='<button class="fmt-wide" data-c="type">Texto ▾</button><span class="fmt-sep"></span><button data-c="bold"><b>B</b></button><button data-c="italic"><i>I</i></button><button data-c="underline"><u>U</u></button><button data-c="strikeThrough"><s>S</s></button><button data-c="code">&lt;/&gt;</button><button data-c="link">🔗</button><button class="fmt-wide" data-c="color">A ▾</button><span class="fmt-sep"></span><button class="fmt-wide" data-c="comment">💬 Comentar</button><button data-c="copy" title="Copiar texto">⧉</button>';document.body.appendChild(fmtEl);fmtEl.addEventListener('mousedown',function(e){e.preventDefault();var bt=e.target.closest('button');if(!bt)return;var c=bt.dataset.c,sc=selectedContext();if(c==='comment'){if(sc){openCommentsPanel(sc.block&&sc.block.id,true);setTimeout(function(){var ta=$('#commentText');if(ta)ta.dataset.quote=sc.text},20)}return}if(c==='copy'){if(sc)copyText(sc.text,'Texto copiado');return}if(c==='type'){if(sc&&sc.block){var r=bt.getBoundingClientRect();typeMenu(sc.block,r.left,r.bottom+5)}return}if(c==='color'){if(sc&&sc.block){var rr=bt.getBoundingClientRect();blockColorMenu(sc.block,rr.left,rr.bottom+5)}return}if(c==='code')wrapInlineCode();else if(c==='link'){var u=prompt('Dirección del enlace:','https://');if(u&&u!=='https://')document.execCommand('createLink',false,u)}else document.execCommand(c,false,null);syncActiveBlock()});};

/* ---------- atajos globales y arranque ---------- */
document.addEventListener('keydown', function(e){
  var commandPressed = e.ctrlKey || e.metaKey;
  var key = e.key.toLowerCase();

  /* Command + Z o Control + Z */
  if(commandPressed && key === 'z' && !e.shiftKey){
    e.preventDefault();
    undoAction();
    return;
  }

  /* Command + Shift + Z o Control + Shift + Z */
  if(commandPressed && key === 'z' && e.shiftKey){
    e.preventDefault();
    redoAction();
    return;
  }

  /* Control + Y, utilizado en algunos navegadores de Windows */
  if(e.ctrlKey && key === 'y'){
    e.preventDefault();
    redoAction();
    return;
  }

  if(e.key === 'Escape'){
    if(modalEl){ closeModal(); return; }
    if(popEl){ closePopup(); return; }
    if(fmtEl) fmtEl.hidden = true;
    return;
  }


  
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k'){
    e.preventDefault();
    openSearch();
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's'){
    e.preventDefault();
    saveNow();
    flashSaved();
  }
});
window.addEventListener('beforeunload', saveNow);
document.addEventListener('visibilitychange', function(){ if(document.hidden) saveNow(); });
window.addEventListener('resize', function(){
  if(window.innerWidth > 760) document.body.classList.remove('mopen');
});
document.getElementById('soverlay').addEventListener('click', function(){
  document.body.classList.remove('mopen');
});
document.getElementById('importFile').addEventListener('change', function(e){
  var f = e.target.files[0];
  if(f) importJson(f);
  e.target.value = '';
});

load();
applyTheme();
initFmt();
document.body.classList.toggle('sclosed', !!state.ui.side);
renderAll();
</script>
